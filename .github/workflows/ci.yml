name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install libpng
        run: brew install libpng
      - name: Build
        run: make -f Makefile.mac
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: exile-macos
          path: exile

  linux:
    # Experimental — audio path currently uses macOS AudioToolbox directly.
    # Linux build will link-fail until BBCSound.cpp / SampleManager.cpp are
    # guarded or ported to an alternate backend (miniaudio/SDL/ALSA).
    name: Linux (experimental)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libpng-dev libglu1-mesa-dev \
            freeglut3-dev libx11-dev libgl1-mesa-dev
      - name: Build
        run: make
